apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mercari-embeddings-jp-dev                      # ← different
nameSuffix: -triton-metadata-attr-tokyo-l4                # ← different

resources:
  - ../../k8s/base

configMapGenerator:
  - name: loadtest-locustfiles
    files:
      - locustfile.py
      - ../../shared/triton_http.py
      - ../../shared/payloads.py

patches:
  - target: {kind: Deployment, name: loadtest}
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - {name: TRITON_URL,    value: "triton-metadata-attribute-prediction.mercari-embeddings-jp-dev.svc.cluster.local:8000"}   # ← different
          - {name: LOAD_MODE,     value: "ramp"}
          - {name: USER_RPS,      value: "2.0"}
          - {name: IMAGE_SIZE,    value: "512"}
          - {name: TOP_N,         value: "5"}
          - {name: ATTRIBUTE_IDS, value: "REPLACE_WITH_REAL_IDS"}   # ← must be IDENTICAL to Singapore